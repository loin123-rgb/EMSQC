<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EMS QC 管制圖</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>EMS QC 管制圖</h1>
      <p>Xbar-R control chart, Cp, Cpk, Ca</p>
    </div>
    <button id="exportExcel" class="primary">下載 Excel</button>
  </header>

  <main class="layout">
    <aside class="panel controls">
      <label>
        產品名稱
        <input id="productName" type="text" value="EMS Product">
      </label>

      <div class="grid2">
        <label>
          每組數量 n
          <input id="groupSize" type="number" min="2" max="10" value="5">
        </label>
        <label>
          顯示筆數
          <input id="sampleCount" type="number" min="1" value="25">
        </label>
      </div>

      <div class="grid3">
        <label>
          USL
          <input id="usl" type="number" step="0.0001" value="80">
        </label>
        <label>
          CL
          <input id="cl" type="number" step="0.0001" value="79.9">
        </label>
        <label>
          LSL
          <input id="lsl" type="number" step="0.0001" value="79.7">
        </label>
      </div>

      <label>
        匯入 Excel
        <input id="fileInput" type="file" accept=".xlsx,.xls,.csv">
      </label>

      <label>
        量測值，每行一筆
        <textarea id="valueInput" rows="14">79.88
79.91
79.86
79.93
79.89
79.90
79.92
79.87
79.94
79.91
79.89
79.88
79.92
79.95
79.90
79.87
79.91
79.93
79.89
79.90
79.92
79.88
79.86
79.91
79.94</textarea>
      </label>

      <div class="actions">
        <button id="calculate" class="primary">重新計算</button>
        <button id="clearData">清除</button>
      </div>
    </aside>

    <section class="content">
      <section class="metrics" id="metrics"></section>
      <section class="chartwrap">
        <div id="xbarChart"></div>
      </section>
      <section class="chartwrap">
        <div id="rChart"></div>
      </section>
      <section class="panel">
        <div class="section-title">原始資料</div>
        <div class="tablewrap">
          <table id="dataTable"></table>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
